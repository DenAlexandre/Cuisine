services:
  - type: web
    name: cuisine-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ADMIN_USERNAME
        sync: false
      - key: SEED_ADMIN_FIRST_NAME
        sync: false
      - key: SEED_ADMIN_LAST_NAME
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PHONE
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
